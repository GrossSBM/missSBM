url: https://grosssbm.github.io/missSBM/

template:
  bootstrap: 5

external-articles:
  - name: jss-paper
    title: "missSBM: An R Package for Handling Missing Values in the Stochastic Block Model (JSS)"
    href: https://doi.org/10.18637/jss.v101.i12
    description: >
      The companion paper (Barbillon, Chiquet & Tabouy, 2022), published in the Journal of
      Statistical Software, describing the models and the missSBM package in detail.

articles:
- title: Articles
  contents:
  - case_study_war_networks
  - jss-paper

reference:
- title: 'Top-level fitting functions'
  desc: >
    Main functions for estimating and sampling from an SBM with missing data
  contents:
    - '`estimateMissSBM`'
    - '`observeNetwork`'
    - '`missSBM_param`'
- title: 'Main classes of objects'
  desc: >
    Description of objects missSBM_fit and missSBM_collection. The class missSBM_fit
    is the more central class of object, embedding fits for both the SBM and the sampling model.
    The class missSBM_collection defines objects for storing a collection of missSBM_fit,
    resulting from the the top-level function estimateMissSBM().
  contents:
    - '`missSBM_fit`'
    - '`coef.missSBM_fit`'
    - '`fitted.missSBM_fit`'
    - '`predict.missSBM_fit`'
    - '`plot.missSBM_fit`'
    - '`missSBM_collection`'
- title: Data sets
  desc: ~
  contents:
    - '`war`'
    - '`frenchblog2007`'
    - '`er_network`'
